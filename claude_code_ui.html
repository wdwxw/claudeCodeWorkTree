<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Code — denver</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg0: #111111; --bg1: #161616; --bg2: #1d1d1d; --bg3: #242424;
    --bs: rgba(255,255,255,0.05); --bm: rgba(255,255,255,0.08);
    --hv: rgba(255,255,255,0.045); --ac: rgba(255,255,255,0.075);
    --t1: #e8e8e8; --t2: #b2b2b2; --t3: #707070; --t4: #454545;
    --orange: #f59e0b;
    --font: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif;
    --mono: 'SF Mono', 'Menlo', 'Monaco', 'Cascadia Code', monospace;
  }
  html, body { height: 100%; width: 100%; overflow: hidden; background: var(--bg0); color: var(--t2); font-family: var(--font); font-size: 13px; line-height: 1.4; -webkit-font-smoothing: antialiased; }
  button { font-family: var(--font); cursor: pointer; background: none; border: none; color: inherit; }
  textarea { font-family: var(--font); }
  .window { display: flex; flex-direction: column; height: 100vh; }

  /* TITLE BAR */
  .titlebar { height: 40px; background: var(--bg1); border-bottom: 0.5px solid var(--bs); display: flex; align-items: center; padding: 0 14px; gap: 10px; flex-shrink: 0; user-select: none; }
  .tl-g { display: flex; gap: 7px; align-items: center; }
  .tl { width: 12px; height: 12px; border-radius: 50%; }
  .tl-r { background: #ff5f57; } .tl-y { background: #febc2e; } .tl-g2 { background: #28c840; }
  .nav-arrows { display: flex; gap: 1px; }
  .nav-btn { font-size: 16px; padding: 1px 4px; border-radius: 3px; color: var(--t4); line-height: 1; transition: color .1s; }
  .nav-btn:hover { color: var(--t3); }
  .breadcrumb { flex: 1; display: flex; align-items: center; justify-content: center; gap: 5px; font-size: 12px; }
  .bc-icon { color: var(--t3); display: flex; }
  .bc-repo { color: var(--t2); } .bc-sep { color: var(--t4); }
  .bc-branch { color: var(--t2); display: flex; align-items: center; gap: 3px; }
  .tb-right { display: flex; align-items: center; gap: 6px; }
  .tb-pill { display: flex; align-items: center; gap: 5px; background: rgba(255,255,255,0.055); border: 0.5px solid var(--bm); border-radius: 6px; padding: 3px 9px; font-size: 11px; color: var(--t2); transition: background .12s; }
  .tb-pill:hover { background: rgba(255,255,255,0.1); }
  .tb-icon { color: var(--t4); padding: 4px; border-radius: 4px; display: flex; align-items: center; transition: color .1s, background .1s; }
  .tb-icon:hover { color: var(--t3); background: var(--hv); }

  /* APP BODY */
  .app-body { display: flex; flex: 1; overflow: hidden; }

  /* SIDEBAR */
  .sidebar { width: 258px; min-width: 258px; background: var(--bg1); border-right: 0.5px solid var(--bs); display: flex; flex-direction: column; overflow: hidden; }
  .sb-act-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 14px 8px; }
  .sb-act-label { display: flex; align-items: center; gap: 8px; font-size: 12px; font-weight: 500; color: var(--t1); }
  .sb-ws-row { display: flex; align-items: center; justify-content: space-between; padding: 3px 14px 7px; }
  .sb-ws-title { font-size: 10.5px; font-weight: 500; color: var(--t4); letter-spacing: 0.05em; text-transform: uppercase; }
  .sb-ws-btns { display: flex; gap: 2px; }
  .sb-icon { color: var(--t4); padding: 3px; border-radius: 4px; display: flex; align-items: center; transition: color .1s, background .1s; }
  .sb-icon:hover { color: var(--t3); background: var(--hv); }
  .ws-list { flex: 1; overflow-y: auto; padding: 2px 8px; }
  .ws-list::-webkit-scrollbar { width: 3px; }
  .ws-list::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 2px; }
  .ws-item { display: flex; align-items: center; gap: 9px; padding: 7px 8px; border-radius: 6px; cursor: pointer; margin-bottom: 1px; transition: background .1s; }
  .ws-item:hover:not(.active) { background: var(--hv); }
  .ws-item.active { background: var(--ac); }
  .ws-ind { width: 18px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .ws-dot { width: 7px; height: 7px; border-radius: 50%; }
  .ws-badge { width: 18px; height: 18px; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; }
  .badge-b { background: #252525; color: #7a7a7a; } .badge-r { background: #1a2c2c; color: #4a9898; }
  .ws-info { flex: 1; min-width: 0; }
  .ws-name { font-size: 12px; color: var(--t2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.3; }
  .ws-item.active .ws-name { color: var(--t1); }
  .ws-sub { font-size: 11px; color: var(--t4); margin-top: 1px; }
  .sb-footer { border-top: 0.5px solid var(--bs); padding: 9px 8px; display: flex; align-items: center; justify-content: space-between; }
  .add-repo-btn { display: flex; align-items: center; gap: 7px; color: var(--t3); font-size: 12px; padding: 4px 7px; border-radius: 5px; transition: color .1s, background .1s; }
  .add-repo-btn:hover { color: var(--t2); background: var(--hv); }
  .footer-icons { display: flex; gap: 2px; }

  /* MAIN */
  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: var(--bg0); }

  /* TABBAR */
  .tabbar { height: 34px; background: var(--bg1); border-bottom: 0.5px solid var(--bs); display: flex; align-items: stretch; flex-shrink: 0; padding: 0 4px; }
  .tabbar-sb-btn { display: flex; align-items: center; padding: 0 8px 0 4px; color: var(--t4); cursor: pointer; border-radius: 4px; transition: color .1s; }
  .tabbar-sb-btn:hover { color: var(--t3); }
  .tab { display: flex; align-items: center; gap: 6px; padding: 0 14px; font-size: 12px; color: var(--t4); cursor: pointer; white-space: nowrap; border-bottom: 1.5px solid transparent; position: relative; top: 0.5px; transition: color .1s; }
  .tab:hover:not(.active) { color: var(--t3); background: rgba(255,255,255,0.02); }
  .tab.active { color: var(--t1); border-bottom-color: var(--t1); }
  .tab-plus { display: flex; align-items: center; padding: 0 8px; color: var(--t4); font-size: 17px; line-height: 1; cursor: pointer; border-bottom: 1.5px solid transparent; position: relative; top: 0.5px; transition: color .1s; }
  .tab-plus:hover { color: var(--t3); }
  .tabbar-right { margin-left: auto; display: flex; align-items: center; padding-right: 4px; }

  /* CONTENT */
  .content { flex: 1; overflow-y: auto; padding: 48px 80px 28px; }
  .content::-webkit-scrollbar { width: 4px; }
  .content::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 2px; }
  .welcome-box { display: inline-block; background: var(--bg2); border: 0.5px solid var(--bm); border-radius: 8px; padding: 11px 16px; margin-bottom: 26px; font-size: 13px; color: var(--t2); line-height: 1.5; }
  code { font-family: var(--mono); font-size: 11.5px; background: rgba(255,255,255,0.07); border: 0.5px solid rgba(255,255,255,0.07); border-radius: 4px; padding: 1px 5px; color: var(--t1); }
  .info-list { display: flex; flex-direction: column; gap: 15px; }
  .info-row { display: flex; align-items: center; gap: 13px; font-size: 13px; color: var(--t2); }
  .info-ic { width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; color: var(--t3); }
  .denver-tag { display: inline-flex; align-items: center; gap: 3px; background: rgba(255,255,255,0.06); border: 0.5px solid rgba(255,255,255,0.1); border-radius: 5px; padding: 1px 6px 1px 7px; font-size: 11.5px; color: var(--t1); margin: 0 1px; vertical-align: baseline; position: relative; top: -0.5px; }
  .denver-caret { font-size: 9px; color: var(--t3); }
  .ext-icon { display: inline-flex; vertical-align: middle; position: relative; top: -1px; margin-left: 2px; color: var(--t3); }

  /* INPUT */
  .input-zone { border-top: 0.5px solid var(--bs); padding: 14px 18px 14px; background: var(--bg0); flex-shrink: 0; }
  .input-card { background: var(--bg1); border: 0.5px solid var(--bm); border-radius: 10px; overflow: hidden; transition: border-color .15s; }
  .input-card:focus-within { border-color: rgba(255,255,255,0.13); }
  .input-ta { display: block; width: 100%; background: transparent; border: none; outline: none; color: var(--t2); font-size: 13px; line-height: 1.55; padding: 12px 14px 10px; resize: none; min-height: 72px; max-height: 200px; }
  .input-ta::placeholder { color: var(--t4); }
  .input-bar { display: flex; align-items: center; gap: 5px; padding: 6px 10px 8px; border-top: 0.5px solid var(--bs); }
  .chip { display: flex; align-items: center; gap: 5px; padding: 3px 8px; border-radius: 5px; font-size: 11.5px; color: var(--t3); cursor: pointer; transition: color .1s, background .1s; background: transparent; }
  .chip:hover { color: var(--t2); background: var(--hv); }
  .bar-icon { color: var(--t4); padding: 3px; border-radius: 4px; display: flex; align-items: center; transition: color .1s, background .1s; }
  .bar-icon:hover { color: var(--t3); background: var(--hv); }
  .tb-spacer { flex: 1; }
  .send-btn { background: rgba(255,255,255,0.065); border: 0.5px solid var(--bm); border-radius: 6px; color: var(--t3); padding: 5px 7px; display: flex; align-items: center; transition: background .1s, color .1s; }
  .send-btn:hover { background: rgba(255,255,255,0.12); color: var(--t1); }
  .plus-btn { color: var(--t3); padding: 4px 6px; border-radius: 5px; display: flex; align-items: center; transition: color .1s, background .1s; }
  .plus-btn:hover { color: var(--t2); background: var(--hv); }
</style>
</head>
<body>
<div class="window">
  <!-- TITLE BAR -->
  <div class="titlebar">
    <div class="tl-g">
      <div class="tl tl-r"></div>
      <div class="tl tl-y"></div>
      <div class="tl tl-g2"></div>
    </div>
    <div class="nav-arrows">
      <button class="nav-btn">&#8249;</button>
      <button class="nav-btn">&#8250;</button>
    </div>
    <div class="breadcrumb">
      <span class="bc-icon">
        <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor">
          <circle cx="4" cy="3.8" r="1.5"/><circle cx="12" cy="3.8" r="1.5"/><circle cx="4" cy="12" r="1.5"/>
          <path fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" d="M4 5.3v5.2"/>
          <path fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" d="M12 5.3q0 3.2-3.2 4.8c-.9.5-1.1 1-1.1 2.1"/>
        </svg>
      </span>
      <span class="bc-repo">ificando/denver</span>
      <span class="bc-sep">&#8250;</span>
      <span class="bc-branch">origin/main
        <svg width="10" height="10" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M3 4.5l3 3 3-3"/></svg>
      </span>
    </div>
    <div class="tb-right">
      <button class="tb-pill">
        <svg width="11" height="11" viewBox="0 0 16 16" fill="currentColor" opacity="0.75"><rect x="2" y="2" width="5.2" height="12" rx="1.2"/><rect x="9" y="2" width="5" height="5.4" rx="1.2"/><rect x="9" y="8.8" width="5" height="5.2" rx="1.2"/></svg>
        /denver
      </button>
      <button class="tb-pill">
        Open
        <svg width="9" height="9" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M3 4.5l3 3 3-3"/></svg>
      </button>
      <button class="tb-icon">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round">
          <rect x="1.5" y="1.5" width="6" height="13" rx="1.2"/><rect x="9" y="1.5" width="5.5" height="5.5" rx="1.2"/><rect x="9" y="9" width="5.5" height="5.5" rx="1.2"/>
        </svg>
      </button>
      <button class="tb-icon">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="8" cy="8" r="6"/><path d="M8 5v3.5l2.5 1.4"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- APP BODY -->
  <div class="app-body">
    <!-- SIDEBAR -->
    <div class="sidebar">
      <div class="sb-act-row">
        <div class="sb-act-label">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round">
            <rect x="1.5" y="1.5" width="5.5" height="13" rx="1.2"/><rect x="9" y="1.5" width="5.5" height="5.5" rx="1.2"/><rect x="9" y="9" width="5.5" height="5.5" rx="1.2"/>
          </svg>
          Activity
        </div>
      </div>
      <div class="sb-ws-row">
        <span class="sb-ws-title">Workspaces</span>
        <div class="sb-ws-btns">
          <button class="sb-icon"><svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"><path d="M2 4h12M4 8h8M6 12h4"/></svg></button>
          <button class="sb-icon"><svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M8 3v10M3 8h10"/></svg></button>
        </div>
      </div>
      <div class="ws-list">
        <div class="ws-item">
          <div class="ws-ind"><div class="ws-badge badge-b">B</div></div>
          <div class="ws-info"><div class="ws-name">bmad</div></div>
        </div>
        <div class="ws-item">
          <div class="ws-ind"><div class="ws-dot" style="background:var(--orange)"></div></div>
          <div class="ws-info"><div class="ws-name">Rabat</div><div class="ws-sub">rabat</div></div>
        </div>
        <div class="ws-item">
          <div class="ws-ind"><div class="ws-badge badge-r">R</div></div>
          <div class="ws-info"><div class="ws-name">rungroup2-v1</div></div>
        </div>
        <div class="ws-item active">
          <div class="ws-ind"><div class="ws-dot" style="background:var(--orange)"></div></div>
          <div class="ws-info"><div class="ws-name">Denver</div><div class="ws-sub">denver</div></div>
        </div>
      </div>
      <div class="sb-footer">
        <button class="add-repo-btn">
          <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
            <path d="M2 3a1 1 0 0 1 1-1h3v2H3v9h9v-3h2v3a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1z"/>
            <path d="M10 1h5v5M15 1L9 7" stroke-width="1.5"/>
          </svg>
          Add repository
        </button>
        <div class="footer-icons">
          <button class="sb-icon"><svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"><circle cx="8" cy="8" r="6.2"/><path d="M8 7v4.5M8 5.2v.6"/></svg></button>
          <button class="sb-icon"><svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="8" r="2.4"/><path d="M8 1.5v1.7M8 12.8v1.7M1.5 8h1.7M12.8 8h1.7M3.4 3.4l1.2 1.2M11.4 11.4l1.2 1.2M11.4 4.6l-1.2 1.2M4.6 11.4l-1.2 1.2"/></svg></button>
        </div>
      </div>
    </div>

    <!-- MAIN -->
    <div class="main">
      <!-- TABBAR -->
      <div class="tabbar">
        <div class="tabbar-sb-btn">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round">
            <rect x="1.5" y="1.5" width="5.5" height="13" rx="1.2"/><rect x="9" y="1.5" width="5.5" height="5.5" rx="1.2"/><rect x="9" y="9" width="5.5" height="5.5" rx="1.2"/>
          </svg>
        </div>
        <div class="tab"><span style="color:var(--t4);font-size:12px">&#10035;</span> Untitled</div>
        <div class="tab active"><span style="color:var(--t2);font-size:12px">&#10035;</span> Untitled</div>
        <div class="tab-plus">+</div>
        <div class="tabbar-right">
          <button class="tb-icon"><svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="8" r="6"/><path d="M8 5v3.5l2.5 1.4"/></svg></button>
        </div>
      </div>

      <!-- CONTENT -->
      <div class="content">
        <div class="welcome-box">
          You're in a new copy of <code>rungroup2-v1</code> called <code>denver</code>
        </div>
        <div class="info-list">
          <div class="info-row">
            <div class="info-ic">
              <svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.35" stroke-linecap="round">
                <circle cx="4" cy="3.8" r="1.35" fill="currentColor" stroke="none"/>
                <circle cx="12" cy="3.8" r="1.35" fill="currentColor" stroke="none"/>
                <circle cx="4" cy="12" r="1.35" fill="currentColor" stroke="none"/>
                <path d="M4 5.2v5.4"/>
                <path d="M12 5.2q0 3.3-3.1 4.9c-.9.5-1 1-.9 2"/>
              </svg>
            </div>
            <div>Branched <code>ificando/denver</code> from <code>origin/main</code></div>
          </div>
          <div class="info-row">
            <div class="info-ic">
              <svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.35" stroke-linecap="round" stroke-linejoin="round">
                <rect x="2" y="4.8" width="12" height="9.5" rx="1.5"/>
                <path d="M5.5 4.8V3.8a2 2 0 0 1 2-2h1a2 2 0 0 1 2 2v1"/>
              </svg>
            </div>
            <div>Created <span class="denver-tag">denver <span class="denver-caret">&#9660;</span></span> and copied 483 files</div>
          </div>
          <div class="info-row">
            <div class="info-ic">
              <svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.35" stroke-linecap="round">
                <circle cx="8" cy="8" r="6.2"/><path d="M8 7.2v4.3M8 5.2v.7"/>
              </svg>
            </div>
            <div>Optional: add a setup script
              <span class="ext-icon"><svg width="11" height="11" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M9.5 2.5H13.5V6.5"/><path d="M13.5 2.5L7 9"/><path d="M12 10v3a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V6a1 1 0 0 1 1-1h3"/></svg></span>
            </div>
          </div>
        </div>
      </div>

      <!-- INPUT ZONE -->
      <div class="input-zone">
        <div class="input-card">
          <textarea class="input-ta" placeholder="Ask to make changes, @mention files, run /commands" rows="3"></textarea>
          <div class="input-bar">
            <button class="chip">
              <span style="color:var(--t1);font-size:13px;line-height:1">&#10035;</span> Sonnet 4.6
            </button>
            <button class="chip">
              <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
                <path d="M8 1.5C5.2 1.5 3 3.7 3 6.5c0 1.4.6 2.6 1.5 3.5V12h7V10c.9-.9 1.5-2.1 1.5-3.5C13 3.7 10.8 1.5 8 1.5z" fill="#f59e0b" opacity="0.9"/>
                <path d="M5.5 12v1.5c0 .3.2.5.5.5h4c.3 0 .5-.2.5-.5V12" stroke="#f59e0b" stroke-width="1.2" fill="none" stroke-linecap="round"/>
              </svg>
              Thinking
            </button>
            <button class="bar-icon">
              <svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round">
                <polygon points="1,3 6,1 10,3 15,1 15,13 10,15 6,13 1,15"/><path d="M6 1v12M10 3v12"/>
              </svg>
            </button>
            <div class="tb-spacer"></div>
            <button class="plus-btn">
              <svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M8 3v10M3 8h10"/></svg>
            </button>
            <button class="send-btn">
              <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M14 2L2 7l4.5 2 2 4.5z"/><path d="M6.5 9L14 2"/>
              </svg>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
